openapi: 3.0.3
info:
  title: Vibe Studio API
  version: 0.1.0
  description: 单一契约源（spec-first）。后端用 oapi-codegen 生成类型，前端用 openapi-typescript 生成客户端。
servers:
  - url: /

paths:
  /api/v1/auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: 注册并签发 token
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RegisterRequest' }
      responses:
        '200':
          description: 注册成功
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthEnvelope' }

  /api/v1/auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: 用户名密码登录并签发 token
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthEnvelope' }

  /api/v1/auth/sms/code:
    post:
      operationId: sendSmsCode
      tags: [auth]
      summary: 发送手机号登录验证码
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SmsCodeRequest' }
      responses:
        '200':
          description: 已发送（dev 环境验证码打印在后端日志）
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OkEnvelope' }

  /api/v1/auth/login/phone:
    post:
      operationId: loginByPhone
      tags: [auth]
      summary: 手机号验证码登录（新号自动注册）并签发 token
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PhoneLoginRequest' }
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthEnvelope' }

  /api/v1/users/me:
    get:
      operationId: getMe
      tags: [users]
      summary: 获取当前登录用户
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: 当前用户
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MeEnvelope' }

  /api/v1/auth/refresh:
    post:
      operationId: refresh
      tags: [auth]
      summary: 用 refresh cookie 轮换续期，返回新 access token
      responses:
        '200':
          description: 续期成功
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TokenEnvelope' }

  /api/v1/auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: 登出（吊销会话、清 refresh cookie）
      responses:
        '200':
          description: 已登出
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OkEnvelope' }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    User:
      type: object
      required: [id, username, email, created_at]
      properties:
        id: { type: string }
        username: { type: string }
        email: { type: string }
        phone: { type: string }
        nickname: { type: string }
        avatar: { type: string }
        status: { type: string }
        created_at: { type: integer, format: int64 }
    RegisterRequest:
      type: object
      required: [username, password]
      properties:
        username: { type: string }
        password: { type: string }
        email: { type: string }
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username: { type: string }
        password: { type: string }
    SmsCodeRequest:
      type: object
      required: [phone]
      properties:
        phone: { type: string }
    PhoneLoginRequest:
      type: object
      required: [phone, code]
      properties:
        phone: { type: string }
        code: { type: string }
    AuthData:
      type: object
      required: [user, access_token]
      properties:
        user: { $ref: '#/components/schemas/User' }
        access_token: { type: string }
    TokenData:
      type: object
      required: [access_token]
      properties:
        access_token: { type: string }
    MeData:
      type: object
      required: [user]
      properties:
        user: { $ref: '#/components/schemas/User' }
    AuthEnvelope:
      type: object
      required: [code, msg]
      properties:
        code: { type: integer, format: int32 }
        msg: { type: string }
        data: { $ref: '#/components/schemas/AuthData' }
    MeEnvelope:
      type: object
      required: [code, msg]
      properties:
        code: { type: integer, format: int32 }
        msg: { type: string }
        data: { $ref: '#/components/schemas/MeData' }
    OkEnvelope:
      type: object
      required: [code, msg]
      properties:
        code: { type: integer, format: int32 }
        msg: { type: string }
    TokenEnvelope:
      type: object
      required: [code, msg]
      properties:
        code: { type: integer, format: int32 }
        msg: { type: string }
        data: { $ref: '#/components/schemas/TokenData' }
