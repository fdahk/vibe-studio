# 本地开发中间件。对齐 coze-studio（MySQL/Redis/MinIO），
# 右size：去掉 Elasticsearch/Milvus/NSQ/etcd（用到再加），起步只跑这三个。
services:
  mysql:
    image: mysql:8.4
    container_name: vibe-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: vibe_studio
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: vibe-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    container_name: vibe-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # 控制台 http://localhost:9001
    volumes:
      - minio_data:/data

volumes:
  mysql_data:
  redis_data:
  minio_data:
